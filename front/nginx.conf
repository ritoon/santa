server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA : toute route inconnue renvoie index.html (React Router gère le reste).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache long pour les assets fingerprintés par Vite.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
